      border-radius: .65rem;
      overflow: hidden;
      position: relative;
      height: 100%

      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 20px 40px -10px rgba(236, 72, 153, .5)

    .artist-img-container {
      position: relative;
      overflow: hidden;
      padding-top: 100%
    }

    .artist-img-container::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60%;
      background: linear-gradient(to top, #0f172a, transparent)
    }

    .artist-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform .7s ease
    }

    .gradient-border-card:hover .artist-img {
      transform: scale(1.1)
    }

      background: linear-gradient(135deg, #ec4899 0, #8b5cf6 100%);
